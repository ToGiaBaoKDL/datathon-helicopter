cogs_target: absolute  # "absolute" or "ratio" — predict COGS directly or as revenue ratio

models:
  lightgbm:
    n_estimators: 2000
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    objective: regression
    verbose: -1
    n_jobs: 8
    early_stopping_rounds: 100
  xgboost:
    n_estimators: 2000
    learning_rate: 0.05
    max_depth: 6
    objective: reg:squarederror
    verbosity: 0
    n_jobs: 8
    early_stopping_rounds: 100
  catboost:
    iterations: 2000
    learning_rate: 0.05
    depth: 6
    loss_function: RMSE
    verbose: false
    thread_count: 8
    early_stopping_rounds: 100
