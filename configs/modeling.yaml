cogs_target: absolute       # "absolute" or "ratio"
residual_target: false      # true = predict residual vs YoY baseline

# Optional: discard rows before this date to focus on recent regime.
# Examples: "2018-01-01" (~5 yr), "2019-01-01" (~4 yr), "2020-01-01" (~3 yr).
# Must be parsable by pandas.to_datetime().  null = use all data.
train_start_date: "2018-01-01"

models:
  lightgbm:
    n_estimators: 5000
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    objective: regression
    verbose: -1
    n_jobs: 8
    early_stopping_rounds: 50
  xgboost:
    n_estimators: 5000
    learning_rate: 0.05
    max_depth: 6
    objective: reg:squarederror
    verbosity: 0
    n_jobs: 8
    early_stopping_rounds: 50
  catboost:
    iterations: 5000
    learning_rate: 0.05
    depth: 6
    loss_function: RMSE
    verbose: false
    thread_count: 8
    early_stopping_rounds: 50
