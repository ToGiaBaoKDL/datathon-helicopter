# MLflow tracking configuration.
# When tracking_uri is null, MLflow is disabled (no-op).
# SQLite backend avoids the deprecated filesystem backend warning.
tracking_uri: sqlite:///mlflow/datathon.db
artifact_uri: file:./mlflow/artifacts
experiment_name: datathon_forecasting

# What to log
log_models: true
log_artifacts: true
log_cv_predictions: false

# Nested run settings
log_optuna_trials: true
log_per_fold_metrics: true
