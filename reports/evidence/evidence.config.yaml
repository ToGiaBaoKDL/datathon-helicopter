appearance:
  default: light
  switcher: false

theme:
  colorPalettes:
    default:
      light:
        - "#173f5f"
        - "#20639b"
        - "#3caea3"
        - "#f6d55c"
        - "#ed553b"
        - "#8f2d56"
        - "#2a9d8f"
        - "#264653"
        - "#e76f51"
        - "#6c757d"
      dark:
        - "#173f5f"
        - "#20639b"
        - "#3caea3"
        - "#f6d55c"
        - "#ed553b"
        - "#8f2d56"
        - "#2a9d8f"
        - "#264653"
        - "#e76f51"
        - "#6c757d"
  colorScales:
    default:
      light:
        - "#ADD8E6"
        - "#00008B"
      dark:
        - "#ADD8E6"
        - "#00008B"
  colors:
    primary:
      light: "#173f5f"
      dark: "#20639b"
    accent:
      light: "#ed553b"
      dark: "#f6d55c"
    base:
      light: "#f8f6f2"
      dark: "#09090b"
    info:
      light: "#0284c7"
      dark: "#38bdf8"
    positive:
      light: "#16a34a"
      dark: "#4ade80"
    warning:
      light: "#f8c900"
      dark: "#fbbf24"
    negative:
      light: "#dc2626"
      dark: "#f87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
