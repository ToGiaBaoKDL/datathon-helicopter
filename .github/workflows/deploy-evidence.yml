name: Deploy Evidence Dashboard

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - 'reports/evidence/**'
      - 'dbt/**'
      - 'warehouse/**'
      - 'configs/**'
      - '.github/workflows/deploy-evidence.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    if: |
      startsWith(github.event.head_commit.message, 'deploy:') ||
      startsWith(github.event.head_commit.message, 'evidence:') ||
      startsWith(github.event.head_commit.message, 'ci:') ||
      startsWith(github.event.head_commit.message, 'feat:') ||
      startsWith(github.event.head_commit.message, 'fix:') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: reports/evidence/package-lock.json

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Cache raw data
        id: cache-data
        uses: actions/cache@v4
        with:
          path: data/raw
          key: datathon-raw-${{ runner.os }}-${{ hashFiles('configs/competition.yaml') }}
          restore-keys: |
            datathon-raw-${{ runner.os }}-

      - name: Download Kaggle data
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: uv run datathon download-data
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

      - name: Build raw tables
        run: uv run datathon build-raw --strict

      - name: Build dbt models
        run: uv run dbt build --project-dir dbt --profiles-dir dbt

      - name: Cache Evidence build artifacts
        uses: actions/cache@v4
        with:
          path: |
            reports/evidence/.svelte-kit
            reports/evidence/node_modules/.vite
          key: evidence-build-${{ runner.os }}-${{ hashFiles('reports/evidence/package-lock.json') }}
          restore-keys: |
            evidence-build-${{ runner.os }}-

      - name: Install Evidence dependencies
        run: npm ci
        working-directory: reports/evidence

      - name: Pull Evidence sources
        run: npm run sources
        working-directory: reports/evidence

      - name: Build Evidence static site
        run: npm run build
        working-directory: reports/evidence
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Check build size
        run: |
          echo "--- Build size ----------------"
          du -sh reports/evidence/build/
          echo "--- Prerendered queries ----------------"
          ls reports/evidence/build/api/prerendered_queries/ 2>/dev/null | wc -l
          echo "--- Largest files ----------------"
          find reports/evidence/build/ -type f -exec du -h {} + | sort -rh | head -10

      - name: Deploy to Netlify
        id: deploy-netlify
        continue-on-error: true
        run: npx netlify-cli deploy --prod --dir=reports/evidence/build --message="Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Vercel
        id: deploy-vercel
        continue-on-error: true
        run: |
          cd reports/evidence
          npx vercel@latest deploy build --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Report deploy status
        run: |
          echo "::notice::Netlify deploy: ${{ steps.deploy-netlify.outcome }}"
          echo "::notice::Vercel deploy: ${{ steps.deploy-vercel.outcome }}"

          if [ "${{ steps.deploy-netlify.outcome }}" = "success" ]; then
            echo "::notice:: Netlify deployed successfully"
          elif [ "${{ steps.deploy-netlify.outcome }}" = "failure" ]; then
            echo "::warning:: Netlify deploy failed — falling back to Vercel"
          fi

          if [ "${{ steps.deploy-vercel.outcome }}" = "success" ]; then
            echo "::notice:: Vercel deployed successfully"
          elif [ "${{ steps.deploy-vercel.outcome }}" = "failure" ]; then
            echo "::warning:: Vercel deploy failed"
          fi

          if [ "${{ steps.deploy-netlify.outcome }}" = "failure" ] && [ "${{ steps.deploy-vercel.outcome }}" = "failure" ]; then
            echo "::error:: Both deploys failed — no site is live"
            exit 1
          fi

          echo "::notice:: At least one platform is live"
